<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Incoming Call</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
text-align:center;
}

.setup{
padding:40px;
}

input{
padding:12px;
font-size:16px;
width:250px;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#28a745;
color:white;
}

#callUI{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
}

.caller{
margin-top:120px;
}

.caller img{
width:120px;
height:120px;
border-radius:100%;
border:4px solid white;
}

.buttons{
position:absolute;
bottom:100px;
width:100%;
}

.accept{
background:green;
padding:15px 30px;
margin:20px;
border-radius:50px;
}

.reject{
background:red;
padding:15px 30px;
margin:20px;
border-radius:50px;
}

</style>
</head>

<body>

<div class="setup">

<h2>📞 Fake Call Prank</h2>

<input id="name" placeholder="Caller Name">

<br>

<input id="delay" placeholder="Call delay seconds" value="5">

<br><br>

<button onclick="startCall()">Start Fake Call</button>

</div>

<div id="callUI">

<div class="caller">

<img src="https://i.imgur.com/6VBx3io.png">

<h2 id="callerName">Unknown</h2>

<p>Incoming Call...</p>

</div>

<div class="buttons">

<button class="accept" onclick="accept()">Accept</button>

<button class="reject" onclick="reject()">Reject</button>

</div>

</div>

<audio id="ring" loop>
<source src="https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg">
</audio>

<script>

function startCall(){

let name=document.getElementById("name").value
let delay=document.getElementById("delay").value

if(name==""){name="Unknown Caller"}

setTimeout(function(){

document.getElementById("callerName").innerText=name
document.getElementById("callUI").style.display="block"

document.getElementById("ring").play()

},delay*1000)

}

function accept(){

document.getElementById("ring").pause()
alert("Call Connected 😄")

}

function reject(){

document.getElementById("ring").pause()
document.getElementById("callUI").style.display="none"

}

</script>

</body>
</html>
